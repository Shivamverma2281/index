<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Translator & A4 Printer</title>

    <style>
        /* --- CSS STYLING --- */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        .controls {
            margin: 20px auto;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            max-width: 600px;
        }

        select, button {
            padding: 10px 15px;
            margin: 5px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
            outline: none;
        }

        select {
            cursor: pointer;
            background: #fff;
        }

        button {
            cursor: pointer;
            color: white;
            border: none;
            transition: background 0.2s;
        }

        .btn-start { background-color: #28a745; }
        .btn-start:hover { background-color: #218838; }

        .btn-stop { background-color: #dc3545; }
        .btn-stop:hover { background-color: #c82333; }

        .btn-print { background-color: #007bff; }
        .btn-print:hover { background-color: #0069d9; }

        .status {
            font-weight: bold;
            margin: 10px 0;
            color: #666;
        }

        .text-areas {
            margin: 20px auto;
            max-width: 800px;
            text-align: left;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 6px;
            resize: vertical;
            font-size: 16px;
            margin-bottom: 20px;
        }

        /* A4 Sheet Preview Styling */
        .a4-container-label {
            font-weight: bold;
            text-align: center;
            margin-top: 30px;
            color: #444;
        }

        .a4 {
            width: 210mm;
            min-height: 297mm;
            background: white;
            margin: 20px auto;
            padding: 20mm;
            box-sizing: border-box;
            box-shadow: 0 0 15px rgba(0,0,0,0.15);
            text-align: left;
            border: 1px solid #ddd;
            word-wrap: break-word;
        }

        #translatedText {
            font-size: 18px;
            line-height: 1.6;
            color: #000;
            white-space: pre-wrap;
            outline: none;
            min-height: 250mm;
            padding: 10px;
            border-radius: 4px;
            transition: background 0.3s;
        }

        /* Editing ke dauran user ko pata chalne ke liye halka border */
        #translatedText:focus {
            background: #fdfdfd;
            border: 1px dashed #007bff;
        }

        /* --- PRINT MEDIA STYLING --- */
        @media print {
            body * {
                visibility: hidden;
            }
            .a4, .a4 * {
                visibility: visible;
            }
            .a4 {
                position: absolute;
                left: 0;
                top: 0;
                width: 210mm;
                height: 297mm;
                box-shadow: none;
                border: none;
                margin: 0;
                padding: 0;
            }
            #translatedText {
                border: none !important;
                background: transparent !important;
            }
        }
    </style>
</head>
<body>

<h1>Voice Translator & Auto-Grammar Corrector</h1>

<!-- Controls Panel -->
<div class="controls">
    <select id="language">
        <option value="en-hi">English to Hindi (अंग्रेजी से हिंदी)</option>
        <option value="hi-en">Hindi to English (हिंदी से अंग्रेजी) + AI Grammar</option>
    </select>

    <button class="btn-start" onclick="startListening()">Start</button>
    <button class="btn-stop" onclick="stopListening()">Stop</button>
    <button class="btn-print" onclick="printPage()">Print</button>

    <div id="statusText" class="status">Status: Idle</div>
</div>

<!-- Live Speech Text Output -->
<div class="text-areas">
    <h3>Your Voice (आपकी आवाज़ यहाँ दिखेगी):</h3>
    <textarea id="speechText" placeholder="Click 'Start' and speak..." readonly></textarea>
</div>

<!-- A4 Paper Preview Component -->
<div class="a4-container-label">A4 Document Print Preview (Click inside to type/edit when stopped)</div>
<div class="a4">
    <!-- contenteditable ko handle karne ke liye events lagaye gaye hain -->
    <div id="translatedText" contenteditable="true" oninput="handleManualInput(this)">Translated & Grammar-Corrected text will appear here. Press 'Stop' anytime to edit freely...</div>
</div>

<!-- --- JAVASCRIPT LOGIC --- -->
<script>
    let recognition;
    let isListening = false;
    let isUserEditing = false; // Check karne ke liye ki user type kar raha hai ya nahi

    // Check Browser Compatibility for Speech Recognition
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = false;

        // Handle Speech results
        recognition.onresult = function(event) {
            let currentResultIndex = event.results.length - 1;
            let text = event.results[currentResultIndex][0].transcript;

            document.getElementById("speechText").value = text;
            
            // Agar user khud type kar raha hai toh voice input overwrite nahi karega
            if (!isUserEditing) {
                updateStatus("Translating & Refining Grammar...");
                translateText(text);
            }
        };

        recognition.onerror = function(event) {
            console.error("Speech recognition error", event.error);
            updateStatus("Error occurred: " + event.error);
        };

        recognition.onend = function() {
            if(isListening) {
                recognition.start();
            } else {
                updateStatus("Status: Stopped (Aap ab edit kar sakte hain)");
            }
        };

    } else {
        alert("Your browser does not support Speech Recognition. Please use Google Chrome.");
        document.getElementById("statusText").innerText = "Status: Browser Not Supported";
    }

    // Start Listening Function
    function startListening() {
        if (!recognition) return;
        isUserEditing = false; // Voice start hote hi manual lock hata dein

        let option = document.getElementById("language").value;
        if (option === "en-hi") {
            recognition.lang = "en-US"; 
        } else {
            recognition.lang = "hi-IN"; 
        }

        isListening = true;
        recognition.start();
        updateStatus("Status: Listening... Speak now (आवाज़ सुनी जा रही है...)");
    }

    // Stop Listening Function
    function stopListening() {
        if (!recognition) return;
        isListening = false;
        recognition.stop();
    }

    // Jab user khud A4 sheet par click karke likhega
    function handleManualInput(element) {
        isUserEditing = true; // System ko batao ki user abhi manually text fix kar raha hai
    }

    // AI Grammar & Spelling Correction Engine
    async function correctGrammarAndSpelling(text, langCode) {
        try {
            let checkLang = (langCode === "en") ? "en-US" : "hi-IN";
            let response = await fetch("https://api.languagetoolplus.com/v2/check", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: `text=${encodeURIComponent(text)}&language=${checkLang}`
            });
            let data = await response.json();
            
            let correctedText = text;
            if (data.matches && data.matches.length > 0) {
                for (let i = data.matches.length - 1; i >= 0; i--) {
                    let match = data.matches[i];
                    if (match.replacements && match.replacements.length > 0) {
                        let bestSuggestion = match.replacements[0].value;
                        let start = match.offset;
                        let end = match.offset + match.length;
                        correctedText = correctedText.substring(0, start) + bestSuggestion + correctedText.substring(end);
                    }
                }
            }
            return correctedText;
        } catch (err) {
            console.error("Grammar Checker Error:", err);
            return text; 
        }
    }

    // Translation API Call Function
    async function translateText(text) {
        let option = document.getElementById("language").value;
        let source, target;

        if (option === "en-hi") {
            source = "en";
            target = "hi";
        } else {
            source = "hi";
            target = "en";
        }

        let url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${source}|${target}`;

        try {
            let response = await fetch(url);
            let data = await response.json();

            if(data.responseData && data.responseData.translatedText) {
                let rawTranslation = data.responseData.translatedText;
                
                updateStatus("Polishing Grammar & Structure...");
                let finalPolishedText = await correctGrammarAndSpelling(rawTranslation, target);

                // Sirf tabhi update karein agar user beech me khud se type na karne laga ho
                if (!isUserEditing) {
                    document.getElementById("translatedText").innerHTML = finalPolishedText;
                    updateStatus("Status: Listening... (Done)");
                }
            } else {
                if(!isUserEditing) document.getElementById("translatedText").innerHTML = "Translation error.";
                updateStatus("Status: Error in translation process");
            }
        } catch (error) {
            console.error("Translation Fetch Error:", error);
            if(!isUserEditing) document.getElementById("translatedText").innerHTML = "Failed to fetch translation.";
            updateStatus("Status: Error fetching translation");
        }
    }

    // Print Function
    function printPage() {
        window.print();
    }

    // Helper function to update status
    function updateStatus(msg) {
        document.getElementById("statusText").innerText = msg;
    }
</script>
</body>
</html>
